<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nullspace</title>
    <style>
      * {
        padding: 0 !important;
        margin: 0 !important;
        overflow: hidden;
      }
      body {
        background-color: #090909;
      }
      canvas {
        background-color: black;
        width: 100%;
        height: 100%;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="canvas"></canvas>
    </div>
    <script type="module">
      import init from "./scripts/nullspace/nullspace.js";
      import { execute_app } from "./scripts/nullspace/nullspace.js";

      init().then(() => {
        console.log("nullspace loaded");
        
        let hash = new Uint8Array([241, 46, 66, 31, 201, 83, 242, 237, 196, 185, 202, 93, 133, 177, 247, 101, 217, 162, 26, 186, 43, 182, 61, 61, 139, 1, 127, 212, 148, 240, 168, 116]);
        // TODO: Could have these grabbed from some login screen before initializing.
        // Or just don't send them in and have the application handle login info.
        let username = "web";
        let password = "password";

        let update_proxy = execute_app("https://127.0.0.1:4433", hash, username, password);

        let worker = new Worker('scripts/worker.js');
        worker.onmessage = function() {
          // This triggers an update for the app outside of the normal setInterval that the app registers itself.
          // This is slower than the normal updateInterval, but it's necessary to keep a good connection when the 
          // browser is minimized or the tab is in the background.
          update_proxy.request_update();
        };
      });
    </script>
  </body>
</html>
